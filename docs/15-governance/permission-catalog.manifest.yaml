# =============================================================================
# Business OS — Permission Catalog Manifest
# =============================================================================
# Single source of truth for platform permission keys.
# Consumed by:
#   - `scripts/generate-permissions.ts` (writes `src/lib/generated/permission-keys.ts`)
#   - Migration `008_rbac_foundation` (SQL seed values mirror this file)
#
# Governance:
#   - Append-only. Existing keys are NEVER repurposed or redefined.
#   - Deprecations mark `deprecated_at`; keys remain in the catalog until a
#     documented retirement process removes them.
#   - See docs/15-governance/RBAC_STANDARD.md.
# =============================================================================
version: 1
permissions:
  # --- Platform administration -----------------------------------------------
  - key: platform.users.view
    name: View platform users
    description: View the list of users across the platform
  - key: platform.users.create
    name: Create platform users
    description: Create new user accounts
  - key: platform.users.update
    name: Update platform users
    description: Update user account details
  - key: platform.users.delete
    name: Delete platform users
    description: Delete user accounts
  - key: platform.organizations.view
    name: View organizations
    description: View all organizations on the platform
  - key: platform.organizations.manage
    name: Manage organizations
    description: Create, update, or archive organizations
  - key: platform.roles.view
    name: View role assignments
    description: View role assignments within an organization
  - key: platform.roles.assign
    name: Assign roles
    description: Grant or revoke roles for users in an organization
  - key: platform.audit.view
    name: View platform audit log
    description: View the platform-wide audit log

  # --- Organization settings -------------------------------------------------
  - key: settings.general.view
    name: View settings
    description: View organization settings
  - key: settings.general.update
    name: Update settings
    description: Update organization settings

  # --- Sensitive settings & platform-scope (Sprint 0.6) ---------------------
  - key: settings.security.manage
    name: Manage sensitive settings
    description: Reveal or rotate sensitive setting values
  - key: platform.settings.manage
    name: Manage platform settings
    description: Mutate platform-scope settings or cross-tenant values

  # --- Audit -----------------------------------------------------------------
  - key: audit.logs.view
    name: View audit logs
    description: View audit log entries within the current org

  # --- Notifications (Sprint 0.8) -------------------------------------------
  - key: notifications.inbox.read
    name: Read own notifications
    description: Read notifications addressed to the current user
  - key: notifications.inbox.create
    name: Create notifications
    description: Create notifications for platform events
  - key: notifications.inbox.manage
    name: Manage notifications
    description: Administer notifications across the organization

  # --- Search (Sprint 0.9) --------------------------------------------------
  - key: search.global.use
    name: Use global search
    description: Invoke the global search & command palette search tab
  - key: search.history.manage
    name: Manage own search history
    description: Clear the caller's personal search history

  # --- Workspace (Sprint 1.0 — MOD-001) -------------------------------------
  - key: workspace.workspace.read
    name: View workspace
    description: View the workspace dashboard
  - key: workspace.workspace.manage
    name: Manage workspace
    description: Manage workspace-level settings
  - key: workspace.organization.read
    name: View organization
    description: View organization profile
  - key: workspace.organization.update
    name: Update organization
    description: Update organization profile
  - key: workspace.branding.read
    name: View branding
    description: View organization branding
  - key: workspace.branding.update
    name: Update branding
    description: Update organization branding
  - key: workspace.profile.read
    name: View profile
    description: View user profile
  - key: workspace.profile.update
    name: Update profile
    description: Update own user profile
  - key: workspace.member.read
    name: View members
    description: View organization members
  - key: workspace.member.invite
    name: Invite members
    description: Invite new members
  - key: workspace.member.remove
    name: Remove members
    description: Remove members
  - key: workspace.invitation.read
    name: View invitations
    description: View pending invitations
  - key: workspace.invitation.revoke
    name: Revoke invitations
    description: Revoke pending invitations

  # --- Platform tenancy (SPR-MOD-001-001) -----------------------------------
  - key: platform.tenant.read
    name: Read tenants
    description: View tenants in Platform Admin
  - key: platform.tenant.create
    name: Create tenant
    description: Provision a new tenant
  - key: platform.tenant.activate
    name: Activate tenant
    description: Transition a tenant to active
  - key: platform.tenant.suspend
    name: Suspend tenant
    description: Suspend an active tenant
  - key: platform.tenant.archive
    name: Archive tenant
    description: Archive a tenant

  # --- Organization structure (SPR-MOD-001-002) -----------------------------
  - key: platform.company.read
    name: Read companies
    description: View companies in Platform Admin
  - key: platform.company.create
    name: Create company
    description: Create a new company under a tenant
  - key: platform.company.activate
    name: Activate company
    description: Transition a company to active
  - key: platform.company.deactivate
    name: Deactivate company
    description: Transition a company to inactive
  - key: platform.company.archive
    name: Archive company
    description: Archive a company
  - key: platform.company.set_default
    name: Set default company
    description: Mark a company as the tenant default
  - key: platform.branch.read
    name: Read branches
    description: View branches in Platform Admin
  - key: platform.branch.create
    name: Create branch
    description: Create a branch under an active company
  - key: platform.branch.update
    name: Update branch
    description: Update mutable branch fields
  - key: platform.branch.archive
    name: Archive branch
    description: Archive a branch
  - key: platform.branch.set_default
    name: Set default branch
    description: Mark a branch as the company default
  - key: platform.financial_year.read
    name: Read financial years
    description: View financial years in Platform Admin
  - key: platform.financial_year.create
    name: Create financial year
    description: Create a financial year for a company
  - key: platform.financial_year.open
    name: Open financial year
    description: Transition a financial year to open
  - key: platform.financial_year.close
    name: Close financial year
    description: Close an open financial year
  - key: platform.financial_year.archive
    name: Archive financial year
    description: Archive a closed financial year
  - key: platform.financial_year.set_default
    name: Set default financial year
    description: Mark a financial year as the company default




roles:
  - key: platform_owner
    name: Platform Owner
    scope: platform
    rank: 10
    permissions: "*"
  - key: platform_admin
    name: Platform Admin
    scope: platform
    rank: 20
    permissions_exclude: [platform.users.delete]
  - key: org_owner
    name: Organization Owner
    scope: organization
    rank: 30
    permissions:
      - platform.roles.view
      - platform.roles.assign
      - settings.general.view
      - settings.general.update
      - audit.logs.view
  - key: administrator
    name: Administrator
    scope: organization
    rank: 40
    permissions:
      - platform.roles.view
      - platform.roles.assign
      - settings.general.view
      - settings.general.update
      - audit.logs.view
  - key: manager
    name: Manager
    scope: organization
    rank: 50
    permissions:
      - settings.general.view
      - audit.logs.view
  - key: supervisor
    name: Supervisor
    scope: organization
    rank: 60
    permissions: [settings.general.view]
  - key: employee
    name: Employee
    scope: organization
    rank: 70
    permissions: [settings.general.view]
  - key: read_only
    name: Read Only
    scope: organization
    rank: 80
    permissions: [settings.general.view]
